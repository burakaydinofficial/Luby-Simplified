services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luby}
      POSTGRES_DB: ${POSTGRES_DB:-luby}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luby} -d ${POSTGRES_DB:-luby}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-luby}:${POSTGRES_PASSWORD:-luby}@db:5432/${POSTGRES_DB:-luby}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: "4000"
      NODE_ENV: production
    expose:
      - "4000"
    # Healthy only once the API is actually listening (after db push + seed).
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    # Wait for the backend to be ready so nginx never proxies to a dead upstream.
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  # --- Test stack (only with: docker compose --profile test ...) ---
  db-test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: luby
      POSTGRES_PASSWORD: luby
      POSTGRES_DB: luby_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luby -d luby_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build: ./backend
    profiles: ["test"]
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://luby:luby@db-test:5432/luby_test?schema=public
      JWT_SECRET: test-secret
      NODE_ENV: test
    command: sh -c "npx prisma db push --skip-generate && npm run seed && npm test"

volumes:
  db-data:
